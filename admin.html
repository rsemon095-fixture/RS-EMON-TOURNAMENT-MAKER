<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RS Emon Admin Panel</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="admin-container">

<div class="admin-box">

<img src="assets/profile.png" class="admin-profile">

<h1>RS Emon</h1>

<h3>Tournament Admin Panel</h3>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Admin Email">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password">

</div>

<button
class="login-btn"
onclick="loginAdmin()">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

<p id="loginStatus"></p>

</div>

</div>

<script src="admin.js"></script>

</body>

</html>
