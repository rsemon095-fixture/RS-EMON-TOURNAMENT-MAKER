<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>RS Emon Admin Login</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="login-box">

<img src="assets/profile.png" class="login-profile">

<h1>RS Emon</h1>

<p>Administrator Login</p>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

<i class="fa-solid fa-lock"></i>

Login

</button>

<p id="loginStatus"></p>

</div>

<script type="module"
src="login.js"></script>

</body>

</html>
