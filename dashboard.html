<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RS Emon Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

<img src="assets/profile.png">

<h2>RS Emon</h2>

<p>Tournament Maker</p>

</div>

<ul>

<li id="navDashboard">

<i class="fa-solid fa-house"></i>

Dashboard

</li>

<li id="navTournament">

<i class="fa-solid fa-trophy"></i>

Tournament

</li>

<li id="navTeams">

<i class="fa-solid fa-users"></i>

Teams

</li>

<li id="navFixtures">

<i class="fa-solid fa-calendar-days"></i>

Fixtures

</li>

<li id="navLive">

<i class="fa-solid fa-futbol"></i>

Live Score

</li>

<li id="navPoints">

<i class="fa-solid fa-ranking-star"></i>

Points Table

</li>

<li id="navNotice">

<i class="fa-solid fa-bullhorn"></i>

Notice

</li>

<li id="navMaintenance">

<i class="fa-solid fa-screwdriver-wrench"></i>

Maintenance

</li>

<li id="logout">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</li>

</ul>

</aside>

<!-- Main -->

<main class="main-panel">

<h1>

RS Emon Tournament Maker

</h1>

<p>

Welcome Admin 👑

</p>

<div class="cards">

<div class="card">

<h2 id="totalTournament">

0

</h2>

<p>Tournaments</p>

</div>

<div class="card">

<h2 id="totalTeams">

0

</h2>

<p>Teams</p>

</div>

<div class="card">

<h2 id="totalMatches">

0

</h2>

<p>Matches</p>

</div>

<div class="card">

<h2 id="liveMatch">

0

</h2>

<p>Live Match</p>

</div>

</div>

<div id="contentArea">

</div>

</main>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
